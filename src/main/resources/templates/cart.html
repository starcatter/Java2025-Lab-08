<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Cart</title><link rel="stylesheet" th:href="@{/style/style.css}"></head>
<body>
<header><h1>Webstore</h1><nav><a href="/products">Products</a> <a href="/cart">Cart</a></nav></header>
<main>
    <h2>Your Cart</h2>
    <p th:if="${#maps.isEmpty(cartItems)}">Cart is empty. <a href="/products">Browse products</a>.</p>
    <ul th:unless="${#maps.isEmpty(cartItems)}">
        <li th:each="entry : ${cartItems}">
            <strong th:text="${entry.key.name}">Product</strong> —
            Qty: <span th:text="${entry.value}">1</span> × $<span th:text="${entry.key.price}">0.00</span>
            <form action="/cart/remove" method="post" style="display:inline; margin-left:10px;">
                <input type="hidden" name="productId" th:value="${entry.key.id}">
                <button type="submit">Remove</button>
            </form>
        </li>
    </ul>
    <br>
    <a th:unless="${#maps.isEmpty(cartItems)}" href="/checkout"><button>Proceed to Checkout</button></a>
</main>
</body>
</html>
