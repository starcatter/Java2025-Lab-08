<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(title='Your Cart', content=~{::content})">
<body>
<div th:fragment="content">
    <h2>Your Cart</h2>

    <p th:if="${#maps.isEmpty(cartItems)}">
        Cart is empty. <a th:href="@{/products}">Browse products</a>.
    </p>

    <table class="table" th:unless="${#maps.isEmpty(cartItems)}">
        <thead>
        <tr><th>Product</th><th>Unit price</th><th>Qty</th><th>Line total</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="entry : ${cartItems}">
            <td><strong th:text="${entry.key.name}">Product</strong></td>
            <td th:text="'$' + ${entry.key.price}">$0.00</td>
            <td th:text="${entry.value}">1</td>
            <td th:text="'$' + ${entry.key.price * entry.value}">$0.00</td>
            <td>
                <form action="/cart/remove" method="post" style="display:inline;">
                    <input type="hidden" name="productId" th:value="${entry.key.id}">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Remove</button>
                </form>
            </td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <th colspan="3" style="text-align:right;">Total:</th>
            <th th:text="'$' + ${total}">$0.00</th>
            <th></th>
        </tr>
        </tfoot>
    </table>

    <p th:unless="${#maps.isEmpty(cartItems)}">
        <a th:href="@{/checkout}" class="btn btn-primary">Proceed to Checkout</a>
    </p>
</div>
</body>
</html>
