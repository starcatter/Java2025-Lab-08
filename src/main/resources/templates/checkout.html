<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(title='Checkout', content=~{::content})">
<body>
<div th:fragment="content">
    <h2>Checkout</h2>
    <p>Review your order below and confirm to complete the purchase.</p>

    <table class="table">
        <thead>
        <tr><th>Product</th><th>Unit price</th><th>Qty</th><th>Line total</th></tr>
        </thead>
        <tbody>
        <tr th:each="entry : ${cartItems}">
            <td th:text="${entry.key.name}">Product</td>
            <td th:text="'$' + ${entry.key.price}">$0.00</td>
            <td th:text="${entry.value}">1</td>
            <td th:text="'$' + ${entry.key.price * entry.value}">$0.00</td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <th colspan="3" style="text-align:right;">Total to pay:</th>
            <th th:text="'$' + ${total}">$0.00</th>
        </tr>
        </tfoot>
    </table>

    <form action="/checkout/process" method="post">
        <button type="submit" class="btn btn-success">Confirm &amp; Pay</button>
        <a th:href="@{/cart}" class="btn btn-secondary">← Back to Cart</a>
    </form>
</div>
</body>
</html>
