<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(title='Shopping cart', content=~{::content})}">
<div th:fragment="content">
    <div class="container mt-5">
        <h1>Checkout</h1>

        <h2>Order contents</h2>
        <table class="table table-bordered">
            <thead>
            <tr>
                <th>Product Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <!-- Iterate over cart items -->
            <tr th:each="item : ${cart.items}">
                <td th:text="${item.key.name}"></td>
                <td>$<span th:text="${item.key.price}"></span></td>
                <td><span th:text="${item.value}"></span></td>
                <td>$<span th:text="${item.key.price * item.value}"></span></td>
                <td>
                    <!-- Remove button form -->
                    <form action="/cart/remove" method="post">
                        <input type="hidden" name="productId" th:value="${item.key.id}">
                        <button class="btn btn-danger btn-sm">Remove</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Checkout form -->
        <form action="/checkout" method="post" class="mt-4">
            <div class="mb-3">
                <label for="deliveryAddress" class="form-label">Delivery Address:</label>
                <textarea id="deliveryAddress" name="deliveryAddress"
                          rows="4" required
                          class="form-control"></textarea>
            </div>

            <!-- Submit button -->
            <button type="submit" class="btn btn-primary">
                Place Order
            </button>
        </form>
    </div>
</div>
</html>
