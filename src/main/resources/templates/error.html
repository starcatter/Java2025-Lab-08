<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(title='Error', content=~{::content})">
<body>
<div th:fragment="content">
    <section class="error-container">
        <h1 th:text="'Error ' + ${code}">Error</h1>
        <p th:text="${message}">Something went wrong.</p>
        <a th:href="@{/}" class="btn btn-primary">Back to home page</a>
    </section>
</div>
</body>
</html>
