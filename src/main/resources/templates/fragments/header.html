<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Header fragment</title>
</head>
<body>
<header th:fragment="headerFragment">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">My App</a>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/about}">About</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/contact}">Contact Us</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/members}">Members</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">Product List</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cart}">Shopping Cart</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/orders}">My Orders</a></li>
            </ul>

            <ul class="navbar-nav" th:if="${session.user == null}">
                <!-- Public Links (visible to guests) [[3]] -->
                <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
                <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
            </ul>

            <ul class="navbar-nav" th:if="${session.user != null}">
                <!-- Logout Link (visible to logged-in users) [[5]] -->
                <li class="nav-item"><span class="nav-link">Hello, [[${session.user}]]!</span></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            </ul>
        </div>
    </nav>
</header>
</body>
</html>
