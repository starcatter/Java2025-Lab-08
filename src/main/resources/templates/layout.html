<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"
      th:fragment="layout (title)">
<head>
    <title th:text="${title}">Webstore</title>
    <object th:include="fragments/head :: head" th:remove="tag"/>
</head>
<body>
<header th:replace="fragments/header :: headerFragment"/>

<main class="container mt-4">
    <div th:replace="${content}"></div>
</main>

<footer th:replace="fragments/footer :: footerFragment"/>
</body>
</html>
