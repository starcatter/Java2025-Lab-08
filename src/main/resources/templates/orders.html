<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(title='My Orders', content=~{::content})">
<body>
<div th:fragment="content">
    <h2>My Orders</h2>

    <p th:if="${#lists.isEmpty(orders)}">
        No orders yet. <a th:href="@{/products}">Start shopping</a>.
    </p>

    <div th:each="o : ${orders}" class="order-card">
        <h3 th:text="'Order #' + ${o.id}">ID</h3>
        <p>
            <span th:text="'Date: ' + ${o.date}">Date</span> |
            <span th:text="'Status: ' + ${o.status}">Status</span>
        </p>
        <ul>
            <li th:each="item : ${o.items}">
                <span th:text="${item.name}">Product</span>
                — <span th:text="${item.qty}">1</span> × $<span th:text="${item.price}">0.00</span>
                = $<span th:text="${item.lineTotal}">0.00</span>
            </li>
        </ul>
        <p><strong th:text="'Order total: $' + ${o.total}">Order total</strong></p>
    </div>
</div>
</body>
</html>
