<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(title='Product Details', content=~{::content})">
<body>
<div th:fragment="content">
    <p><a th:href="@{/products}">← Back to Products</a></p>
    <h2 th:text="${product.name}">Name</h2>
    <img th:src="${product.imageUrl}" style="width:200px; height:200px; object-fit:cover;" alt="">
    <p th:text="${product.description}">Description</p>
    <p><strong th:text="'Price: $' + ${product.price}">Price</strong></p>
    <form action="/cart/add" method="post" class="mt-3">
        <input type="hidden" name="productId" th:value="${product.id}">
        <label>
            Quantity:
            <input type="number" name="qty" value="1" min="1" style="width:60px;">
        </label>
        <button type="submit" class="btn btn-success">Add to Cart</button>
    </form>
</div>
</body>
</html>
