<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(title='Product Details', content=~{::content})">

<div th:fragment="content">
    <div class="container mt-4">
        <h1 th:text="${product.name}">Product Name</h1>
        <p><strong>Description:</strong> <span th:text="${product.description}">Description</span></p>
        <p><strong>Price:</strong> $<span th:text="${product.price}">0.00</span></p>

        <!-- Add to cart button conditionally -->
        <div th:if="${session.user}">
            <form action="/cart/add" method="post">
                <input type="hidden" name="productId" th:value="${product.id}">
                <button type="submit">Add to Cart</button>
            </form>
        </div>

        <a th:href="@{/products}" class="btn btn-secondary">Back to Products</a>
    </div>
</div>
