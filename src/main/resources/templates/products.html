<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(title='Products', content=~{::content})">
<body>
<div th:fragment="content">
    <h2>Products</h2>
    <div class="product-grid">
        <div th:each="p : ${products}" class="product-card">
            <img th:src="${p.imageUrl}" alt="product">
            <h3 th:text="${p.name}">Name</h3>
            <p class="price" th:text="'$' + ${p.price}">0.00</p>
            <a class="btn btn-primary" th:href="@{/products/{id}(id=${p.id})}">View Details</a>
        </div>
    </div>
</div>
</body>
</html>
